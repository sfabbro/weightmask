name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.PAT_FOR_PRIVATE_REPOS }}@github.com/".insteadOf "https://github.com/"
      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: latest

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Run Ruff autofix
        run: pixi run ruff check . --fix

      - name: Ensure no pending autofixes
        run: git diff --exit-code

      - name: Run Ruff format check
        run: pixi run ruff format --check .

      - name: Byte-compile (syntax parity with pre-push)
        run: pixi run python -m compileall -q weightmask tests

      - name: Run lint
        run: pixi run lint

      - name: Test
        run: pixi run test

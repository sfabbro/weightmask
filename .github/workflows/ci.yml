name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install "pre-commit>=4,<5"
      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure --color always

  test:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.PAT_FOR_PRIVATE_REPOS }}@github.com/".insteadOf "https://github.com/"
      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: latest
      - name: Byte-compile (syntax parity with pre-push)
        run: pixi run python -m compileall -q weightmask tests
      - name: Test
        run: pixi run test

# Configuration for Masking and Variance Pipeline

# Flat Masking - Thresholds relative to median flat value
flat_masking:
  low_thresh: 0.5
  high_thresh: 2.0

# Saturation Detection
saturation:
  # method: 'histogram' or 'header'.
  # 'histogram' method uses robust clump finding to detect smeared saturation on detrended data.
  method: 'histogram'
  # Keyword used if method is 'header' or as fallback from histogram
  keyword: 'SATURATE'
  # Histogram parameters (used if method is 'histogram')
  histogram_params:
    hist_min_adu: 30000   # Start analysis above this level (if null, auto-determined above 99th percentile)
    hist_max_adu: null    # End analysis below this level (if null, auto-determined from data max)

  # --- Bleed Trail (Blooming) Masking Parameters ---
  mask_bleed_trails: True  # Dilate saturated cores to cover vertical bleed trails
  bleed_grow_vertical: 50  # Number of pixels to grow the mask up and down along columns
  bleed_grow_horizontal: 2 # Number of pixels to grow the mask left and right

  # Fallback default level if chosen/fallback methods fail
  fallback_level: 65000.0

# SEP Background Estimation
sep_background:
  box_size: 128       # pixels - smaller boxes for better edge handling
  filter_size: 3      # pixels - standard filter size
  # Robustness settings
  mask_threshold: 0.8 # Fallback to global median if >80% of image is masked
  max_box_size: 1024  # Maximum box size to try during tiered retries
  # Add padding to handle edges better
  pad_mode: 'reflect' # Reflect pixels at edges instead of extrapolating

# Astroscrappy Cosmic Ray Detection
cosmic_ray:
  sigclip: 8.5       # sigma threshold - higher to reduce false positives
  objlim: 15.0       # contrast limit - higher to be more conservative
  dynamic_sigclip: false  # disable dynamic adjustment

  # --- Morphological Dilation ---
  dilate_cr: False   # Disabled to improve CR precision. Astroscrappy often catches the wings already.
  dilation_radius: 0

# SEP Object Detection
sep_objects:
  extract_thresh: 3.0 # sigma above background RMS - higher to reduce false detections
  min_area: 10      # pixels - larger minimum area
  ellipse_k: 2.5    # base ellipse scaling factor for masking

  # --- Dynamic Halo Masking ---
  dynamic_halo_scaling: True  # Scale mask radius based on object brightness
  halo_scale_factor: 0.2      # Strength of the logarithmic scaling. 0.0 means no scaling.

  # --- Diffraction Spike Masking ---
  spike_enable: True          # Enable cross-hair masking for very bright stars
  spike_flux_thresh: 1.0e5    # Flux threshold in ADU for spike masking
  spike_length_base: 100      # Base length of the spikes in pixels
  spike_width: 3              # Width of the spike mask in pixels


# Streak Masking Configuration
streak_masking:
  enable: True
  method: 'frangi'  # Uses multi-scale Hessian ridge filtering

  # --- Sparse Trail Detection (RANSAC) ---
  enable_ransac_trails: True
  ransac_params:
    detect_thresh_sig: 4.5  # Detection threshold for candidate points
    min_inliers: 20         # Minimum number of points to form a trail
    residual_threshold: 2.0 # Max distance for a point to be an inlier
    min_length: 50          # Minimum length of the trail in pixels

  # Common parameter(s)
  dilation_radius: 2       # Radius in pixels to dilate the final streak core mask

  # Parameters specific to the Frangi method
  frangi_params:
    # Block processing parameters for large images (e.g., > 2k x 2k)
    # This drastically speeds up execution on empty sky regions.
    block_size: 1024
    block_pad: 32
    # 1. Background / Star Removal
    tophat_radius: 10      # Size of morphological white top-hat. Must be wider than typical streaks

    # 2. Frangi Filter Params
    sigmas: [1, 2, 4]      # Scales to search for ridges. Corresponds roughly to streak widths.
    black_ridges: False    # True if streaks are darker than background (usually False for astronomy)

    # 3. Hysteresis Thresholding
    high_threshold: null
    low_threshold: null
    high_threshold_sig: 8.0
    low_threshold_sig: 3.0

    # 4. Region filtering
    min_area: 25           # Minimum number of pixels in a valid streak
    min_elongation: 5.0    # Minimum ratio of major to minor axis length

# Variance Calculation
variance:
  # Choose 'theoretical' or 'rms_map'. Default is 'theoretical'.
  method: 'theoretical'
  # Parameters for 'theoretical' method:
  gain_keyword: 'GAIN'       # Header keyword for gain (e-/ADU)
  rdnoise_keyword: 'RDNOISE'   # Header keyword for read noise (e-)
  default_gain: 1.5        # Default gain if keyword missing
  default_rdnoise: 5.0       # Default read noise if keyword missing
  # Common parameter:
  epsilon: 1.0e-9          # Small number for division stability

  # --- Robust Post-Processing ---
  rescale_variance: True   # Rescale variance Map so SNR stdev = 1.0 (LSST ScaleVarianceTask)
  unbias_variance: False   # Remove Poisson signal from variance map for "background-only" map

# Flat Masking - Thresholds relative to local structural model
  local_filter_size: 15     # Size of median filter for illumination model
  local_low_thresh: 0.5     # Flag if pixel < this * local model
  local_high_thresh: 2.0    # Flag if pixel > this * local model

  # Bad Column Detection parameters (derivative based)
  col_enable: True          # Enable/disable bad column detection
  col_deriv_sigma: 10.0     # Flag column if jump from neighbor > this * MAD
  col_dead_thresh: 0.1      # Flag column if median < this * global flat median

# Mask Bit Definitions (Informational - used internally by the script)
# mask_bits:
#   BAD: 1
#   SAT: 2
#   CR: 4
#   DETECTED: 8
#   STREAK: 16

# Confidence Map Normalization Parameters (used by weight.py)
confidence_params:
  # Data type for output confidence map (float32 recommended)
  dtype: 'float32'
  # Percentile of valid weights to use for normalization (1-100).
  # 100 uses the absolute maximum. Lower values (e.g., 99) are robust to outliers.
  normalize_percentile: 99.0
  # Optionally scale the 0-1 normalized map to 0-100 for CASUTools compatibility
  scale_to_100: False

# Output Parameters
output_params:
  # Format for the primary map file (--output_map).
  # 'weight': Raw masked inverse variance.
  # 'confidence': Normalized/scaled weight map using confidence_params.
  output_map_format: 'weight' # Choose 'weight' or 'confidence'
  # Mask detected objects (MASK_BITS['DETECTED']) in the weight map?
  mask_detected_in_weight: False

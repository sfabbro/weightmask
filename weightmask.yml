# Canonical configuration for the WeightMask masking and weight-map pipeline.

flat_masking:
  local_filter_size: 15
  local_low_thresh: 0.5
  local_high_thresh: 2.0
  col_enable: true
  col_deriv_sigma: 10.0
  col_dead_thresh: 0.1

saturation:
  method: "histogram"
  keyword: "SATURATE"
  effective_full_scale: 65535.0
  histogram_params:
    hist_min_adu: 30000
    hist_max_adu: null
    guard_fraction: 0.75
    max_upper_factor: 1.05
    plateau_percentile: 99.8
    min_tail_pixels: 8
  mask_bleed_trails: true
  bleed_thresh_sigma: 5.0
  bleed_grow_vertical: 50
  bleed_grow_horizontal: 2
  fallback_level: 65000.0

sep_background:
  method: "sep"
  box_size: 128
  auto_box_scaling: true
  filter_size: 3
  iterations: 2
  mask_threshold: 0.8
  max_box_size: 1024
  median_kernel_size: 31
  smooth_surface_fallback: true

cosmic_ray:
  sigclip: 8.5
  objlim: 15.0
  dynamic_sigclip: false
  dynamic_objlim: true
  psf_aware: true
  psf_fwhm_guess: 3.0
  dilate_cr: false
  dilation_radius: 0
  max_component_area: 12
  min_component_contrast_sigma: 4.0

sep_objects:
  extract_thresh: 3.0
  min_area: 10
  deblend_nthresh: 32
  deblend_cont: 0.005
  clean: true
  clean_param: 1.0
  ellipse_k: 2.5
  seed_thresh_factor: 1.25
  dynamic_halo_scaling: true
  halo_brightness_factor: 0.15
  halo_flux_reference_percentile: 50.0
  max_halo_multiplier: 1.8
  max_elongation: 3.0
  handoff_elongated_to_streak: true
  spike_enable: true
  spike_flux_thresh: 1.0e5
  spike_length_base: 100
  spike_width: 3

streak_masking:
  enable: true
  mode: "auto_ground"
  dilation_radius: 2
  debug: false
  retry_without_existing_mask: true
  retry_if_area_fraction_exceeds: 0.03
  retry_if_support_width_exceeds: 10.0
  satdet_params:
    rescale_percentiles: [4.5, 93.0]
    gaussian_sigma: 2.0
    gaussian_sigmas: [1.5, 2.0, 3.0]
    canny_low_threshold: 0.1
    canny_high_threshold: 0.35
    small_edge_perimeter: 60
    hough_threshold: 10
    hough_min_line_length: 120
    hough_max_line_gap: 30
    hough_rng_seed: 0
    cluster_angle_tol_deg: 3.0
    cluster_rho_tol_px: 30.0
    min_cluster_segments: 3
    edge_buffer: 32
    min_edge_touches: 1
    min_interior_span: 120.0
    min_segment_density: 0.015
    candidate_corridor_radius: 12
    max_existing_mask_fraction: 0.6
    max_candidates: 8
    min_segment_accept: 3
    confidence_threshold: 0.4
  mrt_rescue_params:
    theta_step_deg: 1.0
    peak_threshold_sig: 4.5
    max_candidates: 4
    confidence_threshold: 0.35
  mask_params:
    strip_length: 256
    strip_width: 96
    profile_sigma_threshold: 3.0
    profile_percentile: 85.0
    rotation_interpolation_order: 1
    padding: 4
    min_mask_pixels: 64
    min_row_hits: 8
    min_row_hit_fraction: 0.5
    min_col_hit_fraction: 0.2
    max_support_width: 16
  enable_sparse_ransac: true
  sparse_on_primary_weak_only: true
  sparse_ransac_params:
    detect_thresh_sig: 5.0
    residual_threshold: 2.0
    min_inliers: 10
    min_length: 100
    min_line_density: 0.2
    max_trials: 1000
    max_trails: 3
  frangi_legacy_params:
    block_size: 1024
    block_pad: 32
    tophat_radius: 10
    sigmas: [1, 2, 4]
    black_ridges: false
    high_threshold: null
    low_threshold: null
    high_threshold_sig: 8.0
    low_threshold_sig: 3.0
    min_area: 25
    min_elongation: 5.0

variance:
  method: "theoretical"
  gain_keyword: "GAIN"
  rdnoise_keyword: "RDNOISE"
  default_gain: 1.5
  default_rdnoise: 5.0
  epsilon: 1.0e-9
  rescale_variance: true
  unbias_variance: false

confidence_params:
  dtype: "float32"
  normalize_percentile: 99.0
  scale_to_100: false

output_params:
  output_map_format: "weight"
  mask_detected_in_weight: false

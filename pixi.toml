[workspace]
name = "weightmask"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
lint = "ruff check ."
format = "ruff format ."
test = "pytest"

[dependencies]
python = ">=3.10"
numpy = "*"
astropy = "*"
scikit-image = "*"
sep = "*"
pyyaml = "*"
fitsio = "*"
astroscrappy = "*"
ruff = "*"
pytest = "*"
pre-commit = ">=4.5.1,<5"

[pypi-dependencies]
weightmask = { path = ".", editable = true }

[workspace]
name = "weightmask"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
lint = "ruff check ."
format = "ruff format ."
test = "pytest"
benchmark-synthetic = "python -m tests.benchmarks.run --suite synthetic_v2 --with-baselines"
benchmark-megacam = "python -m tests.benchmarks.run --suite megacam_real"
benchmark-acs = "python -m tests.benchmarks.run --suite acs_compare"
example-complex = "python examples/complex_simulation_example.py"

[dependencies]
python = ">=3.10"
numpy = "*"
astropy = "*"
scikit-image = "*"
sep = "*"
pyyaml = "*"
fitsio = "*"
astroscrappy = "*"
astroquery = "*"
ruff = "*"
pytest = "*"
pre-commit = ">=4.5.1,<5"

[pypi-dependencies]
weightmask = { path = ".", editable = true }
